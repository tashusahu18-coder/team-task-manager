services:
  postgres:
    image: postgres:16-alpine
    container_name: team-task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d team_task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
